<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>数学Ⅱクイズ（難問）</title>
</head>
<body>

<h1>数学Ⅱクイズ（難しめ）</h1>

<p id="question"></p>

<input type="text" id="answer">
<button onclick="checkAnswer()">答える</button>

<p id="result"></p>
<p id="score"></p>

<script>
let questions = [
  {q: "y = x^2 のとき、x=3での微分係数は？", a: "6"},
  {q: "y = 2x^3 の導関数は？（例: 6x^2 の形で）", a: "6x^2"},
  {q: "∫2x dx の答えは？（例: x^2 の形で）", a: "x^2"},
  {q: "log₂8 の値は？", a: "3"},
  {q: "sin90° の値は？", a: "1"},
  {q: "x^2 - 4 = 0 の解は？（正の解）", a: "2"},
  {q: "y = x^2 のグラフの頂点の座標は？（例: 0,0）", a: "0,0"},
  {q: "e^0 の値は？", a: "1"}
];

let current = 0;
let score = 0;

function showQuestion() {
  document.getElementById("question").innerText = questions[current].q;
}

function checkAnswer() {
  let userAnswer = document.getElementById("answer").value.replace(/\s/g, "").toLowerCase();
  let correctAnswer = questions[current].a.replace(/\s/g, "").toLowerCase();

  if (userAnswer === correctAnswer) {
    document.getElementById("result").innerText = "正解！";
    score++;
  } else {
    document.getElementById("result").innerText = "不正解… 正解は " + questions[current].a;
  }

  current++;

  if (current < questions.length) {
    document.getElementById("answer").value = "";
    showQuestion();
  } else {
    document.getElementById("question").innerText = "終了！";
    document.getElementById("result").innerText = "";
    document.getElementById("score").innerText =
      "あなたのスコアは " + score + " / " + questions.length + " です！";
  }
}

showQuestion();
</script>

</body>
</html>
