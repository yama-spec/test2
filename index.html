<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>数学Ⅱクイズ（100問）</title>

  <style>
    body {
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
    }

    input {
      padding: 10px;
      font-size: 16px;
      margin: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: white;
      color: black;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: gray;
    }
  </style>
</head>

<body>

<h1>数学Ⅱクイズ（100問）</h1>

<p id="question"></p>

<input type="text" id="answer">
<button onclick="checkAnswer()">答える</button>

<p id="result"></p>
<p id="score"></p>

<script>
let baseQuestions = [
  {q: "y = x^2 のとき、x=5での微分係数は？", a: "10"},
  {q: "y = x^3 の導関数は？", a: "3x^2"},
  {q: "∫4x dx", a: "2x^2"},
  {q: "log₂16", a: "4"},
  {q: "sin30°", a: "0.5"},
  {q: "cos60°", a: "0.5"},
  {q: "x^2 - 9 = 0 の正の解", a: "3"},
  {q: "e^0", a: "1"},
  {q: "∫x^2 dx", a: "x^3/3"},
  {q: "y = (x^2+1)^2 の導関数", a: "4x(x^2+1)"}
];

// 100問に増やす（ランダムで出題）
let questions = [];
for (let i = 0; i < 100; i++) {
  let rand = Math.floor(Math.random() * baseQuestions.length);
  questions.push(baseQuestions[rand]);
}

let current = 0;
let score = 0;

function showQuestion() {
  document.getElementById("question").innerText =
    "Q" + (current+1) + "： " + questions[current].q;
}

function checkAnswer() {
  let userAnswer = document.getElementById("answer").value.replace(/\s/g,"").toLowerCase();
  let correctAnswer = questions[current].a.replace(/\s/g,"").toLowerCase();

  if (userAnswer === correctAnswer) {
    document.getElementById("result").innerText = "正解！";
    score++;
  } else {
    document.getElementById("result").innerText =
      "不正解… 正解は " + questions[current].a;
  }

  current++;

  if (current < questions.length) {
    document.getElementById("answer").value = "";
    showQuestion();
  } else {
    document.getElementById("question").innerText = "終了！";
    document.getElementById("result").innerText = "";
    document.getElementById("score").innerText =
      "スコア： " + score + " / 100";
  }
}

showQuestion();
</script>

</body>
</html>
